<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你係咩戀愛型人格？ — Linkinhk</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F0F5;
    --card: #FFFFFF;
    --coral: #C060C0;
    --coral-light: #F5E6FA;
    --coral-mid: #D890D8;
    --pink: #F8A0B8;
    --pink-light: #FDE8F2;
    --gold: #F5A030;
    --text: #2B2020;
    --text-mid: #666;
    --text-light: #AAA;
    --border: #E0D8E8;
    --dot: #D8D0E0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'DM Sans', sans-serif;
    background-color: #FFFFFF;
    background-image: radial-gradient(circle, #DDD8E8 1px, transparent 1px);
    background-size: 28px 28px;
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
  }
  
  @media (prefers-color-scheme: dark) {
    body {
      background-color: #FFFFFF !important;
      background-image: radial-gradient(circle, #DDD8E8 1px, transparent 1px) !important;
      color: #2B2020 !important;
    }
    .intro-card, .q-card, .r-card, .result-hero, .blindspot-card, .cta-card, .opt, .trait, .progress-track, .score-track {
      background-color: #FFFFFF !important;
      color: inherit !important;
    }
    .opt {
      background-color: #F2F0F5 !important;
    }
    .trait {
      background-color: #F2F0F5 !important;
    }
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 36px 20px 80px;
  }

  /* Brand Header */
  .brand-header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease forwards;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .brand-logo .in-box {
    background: linear-gradient(135deg, #F880A8, #9040C0);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 6px;
    letter-spacing: 0;
    margin-left: 1px;
  }

  /* ===== INTRO ===== */
  #intro { animation: fadeUp 0.5s ease 0.1s both; }

  .intro-card {
    background: var(--card);
    border-radius: 28px;
    padding: 36px 28px 32px;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .intro-card::before {
    content: '💗';
    position: absolute;
    top: -10px; right: -10px;
    font-size: 80px;
    opacity: 0.07;
    transform: rotate(20deg);
  }

  .eyebrow {
    display: inline-block;
    background: var(--coral-light);
    color: var(--coral);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .intro-title {
    font-size: clamp(24px, 6vw, 34px);
    font-weight: 700;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 14px;
    letter-spacing: -0.5px;
  }

  .intro-title em {
    font-style: normal;
    background: linear-gradient(135deg, #F880A8, #9040C0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .intro-desc {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.8;
    margin-bottom: 28px;
  }

  /* Polaroid type previews */
  .polaroids-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .polaroid {
    background: white;
    border-radius: 8px;
    padding: 14px 14px 20px;
    box-shadow: 0 3px 16px rgba(0,0,0,0.1);
    width: 110px;
    text-align: center;
    transform: rotate(-2deg);
    transition: transform 0.2s ease;
  }

  .polaroid:nth-child(2) { transform: rotate(1.5deg); }
  .polaroid:nth-child(3) { transform: rotate(-1deg); }
  .polaroid:nth-child(4) { transform: rotate(2deg); }

  .polaroid:hover { transform: rotate(0deg) scale(1.05); }

  .polaroid-emoji { font-size: 30px; margin-bottom: 8px; display: block; }
  .polaroid-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .polaroid-sub {
    font-size: 10px;
    color: var(--text-light);
    line-height: 1.4;
  }

  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, #F880A8, #9040C0);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    box-shadow: 0 8px 28px rgba(232,97,74,0.35);
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(232,97,74,0.45);
  }

  .intro-footnote {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    margin-top: 14px;
  }

  /* ===== QUIZ ===== */
  #quiz { display: none; }

  .progress-wrap {
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .progress-count {
    font-size: 13px;
    font-weight: 700;
    color: var(--coral);
  }

  .progress-track {
    height: 5px;
    background: white;
    border-radius: 100px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #F880A8, #9040C0, #F5A030);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .q-card {
    background: var(--card);
    border-radius: 24px;
    padding: 30px 26px 26px;
    margin-bottom: 14px;
    box-shadow: 0 4px 28px rgba(0,0,0,0.06);
    animation: fadeUp 0.45s ease both;
  }

  .q-tag {
    display: inline-block;
    background: var(--coral-light);
    color: var(--coral);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .q-text {
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .q-sub {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }

  .opt:hover {
    background: var(--coral-light);
    border-color: var(--coral-mid);
    transform: translateX(3px);
  }

  .opt.selected {
    background: var(--coral-light);
    border-color: var(--coral);
  }

  .opt-letter {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    transition: all 0.2s ease;
    margin-top: 1px;
  }

  .opt.selected .opt-letter {
    background: var(--coral);
    border-color: var(--coral);
    color: white;
  }

  .opt-body {}
  .opt-main {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 3px;
  }
  .opt-sub {
    font-size: 11px;
    color: var(--text-light);
    line-height: 1.5;
    font-style: italic;
  }

  .nav-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.45s ease 0.1s both;
  }

  .btn-back {
    flex-shrink: 0;
    background: white;
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 14px 22px;
    font-size: 14px;
    color: var(--text-mid);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
  }

  .btn-back:hover { border-color: var(--text-mid); }

  .btn-next {
    flex: 1;
    background: linear-gradient(135deg, #F880A8, #9040C0);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.25s ease;
    opacity: 0.35;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(232,97,74,0.2);
  }

  .btn-next.active {
    opacity: 1;
    pointer-events: all;
    box-shadow: 0 6px 24px rgba(232,97,74,0.35);
  }

  .btn-next.active:hover {
    transform: translateY(-2px);
  }

  /* ===== RESULT ===== */
  #result { display: none; }

  .result-hero {
    background: var(--card);
    border-radius: 28px;
    padding: 36px 28px 28px;
    text-align: center;
    margin-bottom: 14px;
    box-shadow: 0 4px 28px rgba(0,0,0,0.07);
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .result-hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #F880A8, #9040C0, #F5A030);
  }

  .r-eyebrow {
    display: inline-block;
    background: var(--coral-light);
    color: var(--coral);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .r-emoji { font-size: 56px; margin-bottom: 14px; display: block; }

  .r-name {
    font-size: clamp(24px, 6vw, 32px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .r-tagline {
    font-size: 13px;
    color: var(--coral);
    font-weight: 500;
    line-height: 1.65;
    max-width: 340px;
    margin: 0 auto;
  }

  .r-card {
    background: var(--card);
    border-radius: 22px;
    padding: 26px 24px;
    margin-bottom: 14px;
    box-shadow: 0 3px 20px rgba(0,0,0,0.05);
    animation: fadeUp 0.5s ease both;
  }

  .r-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 14px;
  }

  .r-desc {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.9;
  }

  .traits-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .trait {
    background: var(--bg);
    border-radius: 14px;
    padding: 14px 14px;
  }

  .trait-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 5px;
  }

  .trait-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }

  /* Score bars */
  .score-list { display: flex; flex-direction: column; gap: 14px; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .score-name {
    font-size: 12px;
    color: var(--text-mid);
    width: 72px;
    flex-shrink: 0;
  }

  .score-track {
    flex: 1;
    height: 7px;
    background: var(--bg);
    border-radius: 100px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #F880A8, #9040C0);
    width: 0;
    transition: width 1.1s cubic-bezier(0.4,0,0.2,1) 0.3s;
  }

  .score-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--coral);
    width: 34px;
    text-align: right;
  }

  /* Blindspot */
  .blindspot-card {
    background: var(--pink-light);
    border: 2px solid #F0C0CC;
    border-radius: 22px;
    padding: 24px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
  }

  .blindspot-card .r-section-label { color: var(--pink); }

  /* Linkinhk CTA card */
  .cta-card {
    background: var(--card);
    border-radius: 24px;
    padding: 28px 24px;
    margin-bottom: 14px;
    box-shadow: 0 4px 28px rgba(232,97,74,0.12);
    border: 2px solid var(--coral-light);
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }

  .cta-card::before {
    content: '💛';
    position: absolute;
    top: 20px; right: 20px;
    font-size: 28px;
    opacity: 0.6;
  }

  .cta-platform {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }

  .cta-logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .cta-logo .in-box {
    background: linear-gradient(135deg, #F880A8, #9040C0);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 5px;
    margin-left: 1px;
  }

  .cta-tag {
    font-size: 10px;
    background: var(--coral-light);
    color: var(--coral);
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .cta-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -0.3px;
    line-height: 1.4;
  }

  .cta-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.8;
    margin-bottom: 22px;
  }

  .cta-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .cta-pill {
    background: var(--bg);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-mid);
    font-weight: 500;
  }

  .btn-cta {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #F880A8, #9040C0);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 17px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.25s ease;
    box-shadow: 0 8px 28px rgba(232,97,74,0.3);
    letter-spacing: 0.3px;
  }

  .btn-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(232,97,74,0.42);
  }

  .btn-retry {
    display: block;
    width: 100%;
    background: white;
    border: 2px solid var(--border);
    border-radius: 100px;
    padding: 15px;
    font-size: 14px;
    color: var(--text-mid);
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all 0.2s ease;
    margin-top: 10px;
  }

  .btn-retry:hover { border-color: var(--text-mid); color: var(--text); }

  .insight-card {
    background: var(--card);
    border-radius: 22px;
    padding: 26px 24px;
    margin-bottom: 14px;
    box-shadow: 0 3px 20px rgba(0,0,0,0.05);
    animation: fadeUp 0.5s ease both;
  }

  .insight-row {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .insight-match {
    background: var(--bg);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .insight-match-emoji {
    font-size: 28px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .insight-match-body {}

  .insight-match-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 5px;
  }

  .insight-match-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.7;
  }

  .insight-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 8px;
  }

  .tag-best { background: #E8F8EE; color: #2A9B54; }
  .tag-hard { background: #FFF0E8; color: #C05020; }
  .tag-role { background: #EEE8FA; color: #7040B0; }
  .tag-pattern { background: #FFF8E0; color: #A07010; }

  .pattern-line {
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.8;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 14px;
    border-left: 3px solid var(--coral);
  }

  .role-card {
    background: linear-gradient(135deg, #F5E6FA, #EEE0F8);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .role-icon {
    font-size: 36px;
    flex-shrink: 0;
  }

  .role-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .role-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.75;
  }

  .role-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }

  .role-tag {
    background: rgba(120,50,180,0.1);
    color: #7832B4;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.5px;
  }

  .pattern-block {
    border-radius: 16px;
    overflow: hidden;
  }

  .pattern-header {
    background: linear-gradient(135deg, #FFF3E0, #FFE8CC);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(200,140,40,0.15);
  }

  .pattern-header-icon { font-size: 28px; flex-shrink: 0; }

  .pattern-header-title {
    font-size: 14px;
    font-weight: 700;
    color: #8B5A00;
  }

  .pattern-header-sub {
    font-size: 11px;
    color: #B07820;
    margin-top: 2px;
  }

  .pattern-body {
    background: #FFFAF2;
    padding: 16px 20px;
  }

  .pattern-body-text {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .pattern-tip {
    background: rgba(200,140,40,0.08);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8B5A00;
    line-height: 1.7;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .pattern-tip-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }

  .footnote {
    text-align: center;
    font-size: 11px;
    color: var(--text-light);
    margin-top: 28px;
    line-height: 1.8;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    .polaroids-row { gap: 7px; }
    .polaroid { width: 90px; }
    .traits-wrap { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

let cur = 0, ans = [];

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  const q = Qs[cur];
  document.getElementById('q-count').textContent = `${cur+1} / 8`;
  document.getElementById('prog-fill').style.width = `${(cur+1)/8*100}%`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const el = document.getElementById('opts');
  el.innerHTML = '';
  ['A','B','C','D'].forEach((l, i) => {
    const o = q.opts[i];
    const btn = document.createElement('button');
    btn.className = 'opt' + (ans[cur] === i ? ' selected' : '');
    btn.innerHTML = `<div class="opt-letter">${l}</div><div class="opt-body"><div class="opt-main">${o.t}</div><div class="opt-sub">${o.s}</div></div>`;
    btn.onclick = () => pick(i);
    el.appendChild(btn);
  });

  const nxt = document.getElementById('btn-next');
  nxt.textContent = cur === 7 ? '睇結果 →' : '下一題 →';
  nxt.classList.toggle('active', ans[cur] !== undefined);
  document.getElementById('btn-back').style.visibility = cur === 0 ? 'hidden' : 'visible';

  const card = document.getElementById('q-card');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function pick(i) {
  ans[cur] = i;
  document.querySelectorAll('.opt').forEach((b,j) => b.classList.toggle('selected', j===i));
  document.getElementById('btn-next').classList.add('active');
}

function nextQ() {
  if (ans[cur] === undefined) return;
  if (cur < 7) { cur++; renderQ(); }
  else showResult();
}

function prevQ() {
  if (cur > 0) { cur--; renderQ(); }
}

function calc() {
  const t = {P:0,S:0,A:0,R:0};
  ans.forEach((a,qi) => { const sc = Qs[qi].opts[a].sc; Object.keys(sc).forEach(k => t[k]+=sc[k]); });
  const mx = 24;
  const pct = {P:Math.round(t.P/mx*100), S:Math.round(t.S/mx*100), A:Math.round(t.A/mx*100), R:Math.round(t.R/mx*100)};
  let type = 'flow';
  if (t.P >= 16 && t.S >= 16) type = 'roots';
  else if (t.A >= 16 && t.P < 16) type = 'spark';
  else if (t.R >= 16 && t.A < 16) type = 'scope';
  return { type, pct };
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const { type, pct } = calc();
  const r = TYPES[type];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-name').textContent = r.name;
  document.getElementById('r-tagline').textContent = r.tagline;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-blind').textContent = r.blind;
  document.getElementById('r-cta-title').textContent = r.ctaT;
  document.getElementById('r-cta-desc').textContent = r.ctaD;

  document.getElementById('r-traits').innerHTML = r.traits.map(t =>
    `<div class="trait"><div class="trait-label">${t.l}</div><div class="trait-val">${t.v}</div></div>`
  ).join('');

  const dims = [
    {n:'慢節奏',p:pct.P},{n:'安全感',p:pct.S},{n:'主動性',p:pct.A},{n:'認真度',p:pct.R}
  ];
  document.getElementById('r-scores').innerHTML = dims.map(d =>
    `<div class="score-row">
      <div class="score-name">${d.n}</div>
      <div class="score-track"><div class="score-fill" data-w="${d.p}%"></div></div>
      <div class="score-pct">${d.p}%</div>
    </div>`
  ).join('');

  // Populate insight sections
  document.getElementById('r-best-match').innerHTML = r.bestMatch.map(m => `
    <div class="insight-match">
      <div class="insight-match-emoji">${m.emoji}</div>
      <div class="insight-match-body">
        <div class="insight-tag tag-best">最夾</div>
        <div class="insight-match-title">${m.type}</div>
        <div class="insight-match-desc">${m.reason}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('r-hard-match').innerHTML = `
    <div class="insight-match">
      <div class="insight-match-emoji">${r.hardMatch.emoji}</div>
      <div class="insight-match-body">
        <div class="insight-tag tag-hard">需要理解</div>
        <div class="insight-match-title">${r.hardMatch.type}</div>
        <div class="insight-match-desc">${r.hardMatch.reason}</div>
      </div>
    </div>
  `;

  document.getElementById('r-role').innerHTML = `
    <div class="role-card">
      <div class="role-icon">${r.roleIcon}</div>
      <div>
        <div class="role-title">${r.roleTitle}</div>
        <div class="role-desc">${r.roleDesc}</div>
        <div class="role-tags">${r.roleTags.map(t=>`<span class="role-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `;

  document.getElementById('r-pattern').innerHTML = `
    <div class="pattern-block">
      <div class="pattern-header">
        <div class="pattern-header-icon">${r.patternIcon}</div>
        <div>
          <div class="pattern-header-title">${r.patternName}</div>
          <div class="pattern-header-sub">你最常見嘅戀愛循環</div>
        </div>
      </div>
      <div class="pattern-body">
        <div class="pattern-body-text">${r.patternDesc}</div>
        <div class="pattern-tip">
          <div class="pattern-tip-icon">💡</div>
          <div>${r.patternTip}</div>
        </div>
      </div>
    </div>
  `;

  setTimeout(() => {
    document.querySelectorAll('.score-fill').forEach(b => b.style.width = b.dataset.w);
  }, 250);

  window.scrollTo({top:0, behavior:'smooth'});
}

function retry() {
  cur = 0; ans = [];
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
